global_scan:
  edge_expand_px: 10
  nomination_threshold: 0.3
  text_ui_ratio_critical: 0.6
  subtitle_band_ratio: 0.15
  text_edge_density: 0.12

edge_bleed:
  green_spill_minor: 0.05
  green_spill_moderate: 0.15
  green_spill_critical: 0.30
  green_channel_threshold: 0.15
  delta_e_spill_threshold: 10.0
  spill_ratio_minor: 0.05

compression:
  blockiness_threshold: 1.8
  blockiness_coarse_threshold: 1.4
  mild_blockiness_threshold: 1.02
  texture_var_reference: 2400.0
  texture_loss_threshold: 0.38
  edge_block_ratio_threshold: 1.012

blur:
  texture_var_reference: 2400.0
  texture_loss_threshold: 0.42
  min_foreground_ratio: 0.05

mosaic:
  score_threshold: 0.48
  localize_threshold: 0.35

banding:
  score_threshold: 0.38
  localize_threshold: 0.30

background_artifact:
  blockiness_threshold: 1.35
  color_cast_threshold: 0.18
  min_background_ratio: 0.12

hair_texture:
  relative_laplacian_threshold: 0.55
  max_hair_laplacian_var: 35.0
  min_hair_pixels: 80

face_artifact:
  overexposure_ratio_threshold: 0.25
  blur_laplacian_threshold: 85.0
  min_face_pixels: 300

hand_anomaly:  # experimental MVP — heuristic hand ROI; see specs/hand_anomaly.spec.md
  edge_density_threshold: 0.14
  finger_spread_threshold: 2.8
  min_hand_pixels: 250

report:
  base_mos: 4.5
  decay_factor: 0.7
  system_version: "0.1.0"
  # MOS 预测后端：
  #   rule      — 默认，硬编码 mos_impact + 衰减公式（零依赖）
  #   clip_iqa  — CLIP-IQA 无参考画质预测（需 pip install "lqdd[clip_iqa]"）
  #   internal  — 预留，需自行实现 lqdd.mos.internal_model
  mos_model: "rule"

agent:
  enabled: true
  max_rounds: 2
  high_confidence_threshold: 0.7
  grey_zone_lower: 0.4
  grey_zone_upper: 0.7
  max_detectors_per_frame: 9
  hard_decision_threshold: 0.55

vlm:
  provider: ollama
  model: qwen2.5vl:7b
  host: http://localhost:11434
  timeout_ms: 120000
  max_calls_per_frame: 3

judge:
  provider: ollama
  model: qwen2.5:1.5b
  host: http://localhost:11434
  timeout_ms: 45000
